  temporal_domain: "Mission duration: 30 sol base operations."
  physical_processes_included: ["Power generation", "Heat rejection", "Air revitalization"]
  physical_processes_excluded: ["Detailed crew metabolic modeling"]
  system_interfaces_represented: ["Power–Thermal", "ECLSS–Structure", "Command–Data Handling"]
  model_resolution_or_granularity: "Subsystem-level parametric definition"
  inputs:
    - "Solar insolation profiles"
    - "Subsystem power loads"
  outputs:
    - "Mass and power budgets"
    - "Subsystem interdependency matrix"
  external_couplings:
    coupled_models_or_systems: ["ISRU Power Model (future link)"]
    coupling_methods: ["Manual parameter linkage"]
  fidelity_level:
    descriptive_fidelity: "SysML logical and physical blocks"
    computational_fidelity: "Conceptual-level parameter linking"
    representation_fidelity: "Requirement and parametric traceability only"

