model_identity_and_focus:
  model_identifier: LUNAR-BASE-001
  model_title: "Lunar Base Baseline Model (v001)"
  model_description: "Initial SysML model defining the foundational structure of a lunar surface habitat, focusing on interconnections among Power, Thermal, and ECLSS subsystems."
  model_developer: ["Georgia Tech ASDL", "Lunar Base Team"]
  organization_or_sponsor: ["NASA", "Georgia Institute of Technology"]
  model_domain_or_discipline: ["Systems Engineering", "Space Habitat Architecture"]
  model_subsystem_or_focus_area: ["Power", "Thermal", "ECLSS"]
  associated_mission_program_or_project: ["Pioneer / DELOS Lunar Architecture Initiative"]
  access_control: "Internal – Research Use"
  objectives:
    - "Define high-level system architecture for the Lunar Base habitat."
    - "Establish initial requirement allocation across subsystems."
  key_phenomena_represented:
    - "Resource generation and recycling loops."
    - "Thermal control under lunar diurnal cycles."
    - "Habitat power regulation."
  assumptions_and_simplifications:
    - "Nominal operation phase; emergency modes not modeled."
    - "Steady-state energy balance assumed for initial architecture."

model_scope_of_content:
