    Model Purpose:
      ES Model Purpose:
        Base Instance:
          Access Control: Public
          Identifier: ShelfImpl4_Purpose
          Description: Provides a simulation framework for evaluating crop performance
            and resource usage in a lunar greenhouse environment.
          Defining Activity: Development of a computational model for plant growth
            under varying environmental constraints.
          Purpose Type:
          - Simulation Method Development
    Modeled System of Interest:
      System of Interest:
        Each Modeled System of Interest:
          Access Control: Public
          Identifier: LunarGreenhouseShelf
          Description: The physical shelf structure that supports crop cultivation
            in a lunar greenhouse, including light, water, and power management.
          Defining Activity: Modeling the interactions between plant physiology and
            environmental controls on the shelf.
    Modeled Environmental Domains:
      Modeled Domains:
        Each Modeled Domain:
          Access Control: Public
          Identifier: ControlledEnvironment
          Description: "The controlled atmospheric conditions (CO\u2082 concentration,\
