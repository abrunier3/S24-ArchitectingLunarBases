          Defining Activity: Simulation of environmental parameter effects on crop
            growth.
          Type: Use
          Classification: Nominal
    Modeled Scenario:
      Modeled Scenarios:
        Each Modeled Scenario:
          Access Control: Public
          Identifier: CO2ConstraintScenario
          Description: "Crop planted at mission start with CO\u2082 concentration\
            \ constrained between 330 and 1300 ppm; growth halted below 330 ppm and\
            \ capped above 1300 ppm."
          Defining Activity: "Evaluating crop response to CO\u2082 limits over a one\u2011\
            hour timestep."
          Model Objectives:
          - "Assess impact of CO\u2082 constraints on daily carbon gain"
          - Validate transpiration rate calculations under light and water limits
