title: ISSOGA
identity_and_focus:
  identity_and_focus:
    Model Identity:
      ES Model Identity:
        Base Instance:
          Identifier: ISSOGA
          Description: Simple implementation of an oxygen generation system for the
            International Space Station, using electrolysis with assumed 100% conversion
            efficiency.
          Defining Activity: "Modeling and simulation of on\u2011orbit oxygen production\
            \ rates and power requirements."
    Model Purpose:
      ES Model Purpose:
        Base Instance:
          Identifier: ISSOGA Development
          Description: Developmental model to support design and verification of the
            ISS Oxygen Generation System (OGA) performance under various operational
            scenarios.
          Defining Activity: Simulation of OGA operation, power consumption, and crew
            support capacity.
          Purpose Type:
          - Developmental
          - Simulation Method Development
    Modeled System of Interest:
      System of Interest:
        Each Modeled System of Interest:
          Identifier: ISS Oxygen Generation System (OGA)
          Description: "The on\u2011orbit oxygen generation subsystem that produces\
            \ up to 5.4\u202Fkg/day under day/night cycles and selectable rates between\
            \ 2.3\u20139.2\u202Fkg/day when operated continuously."
          Defining Activity: "Production of breathable O\u2082 for crew and life support."
    Modeled Environmental Domains:
      Modeled Domains:
        Each Modeled Domain:
          Identifier: Space Life Support Environment
          Description: The environmental conditions within the ISS habitat where oxygen
            generation is required to maintain atmospheric composition.
          Defining Activity: Assessment of OGA performance under nominal spaceflight
            conditions.
          Type: Use
          Classification: Nominal
    Modeled Scenario:
      Modeled Scenarios:
        Each Modeled Scenario:
          Identifier: Day/Night Orbital Cycle Operation
          Description: Simulation of OGA operation during the ISS day/night power
            cycle, supporting up to six crew members and biological specimens.
          Defining Activity: Evaluate oxygen production rates, power consumption,
            and system capacity under cyclic power availability.
