        - Access Control: Public
        - Identifier: ISSinjectorImpl
        - Description: To regulate and maintain the partial pressure of oxygen and
            overall cabin pressure within specified limits for crew safety.
        - Defining Activity: Pressure control, gas venting
        - Reference list of purposes:
          - ISO/IEC/IEEE 15288
    - System Lifecycle Span Supported:
