  - Requirements (Flat, paraphrased):
    - System/Subsystem Focus:
      - Provide adequate generation for early missions under variant assumptions.
      - Distribute power to mission loads through a managed distribution subsystem.
      - Include storage sized to mission profile and thermal constraints.
      - Condition/manage delivered power characteristics as required by loads.
      - Address thermal removal obligations for power components.
    - Power Generation specifics:
      - Photovoltaic-based generation for initial capability.
      - Order-of-magnitude capacity target ~90 kW (subject to variant trade space).
      - Emphasis on minimizing mass vs. performance trade.
      - Ensure electrical interface into the conditioning/management chain.

