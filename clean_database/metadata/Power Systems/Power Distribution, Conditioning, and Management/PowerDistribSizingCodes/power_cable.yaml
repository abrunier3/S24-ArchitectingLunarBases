  - Conceptual Model Representation:
    - Conceptual Model Representation Types:
      - Each Conceptual Model:
        - Identifier: SurfacePowerCable
        - Description: 'A deterministic sizing model for surface power cables that
            calculates conductor, dielectric,

            EMI shielding, and reel masses. It evaluates multiple voltage options
            using thermal assumptions

            for the lunar South Pole and ASTM standards for copper wires on Earth,
            selecting the voltage

            that yields the lowest total mass.

            '
        - Defining Activity: Cable Sizing
