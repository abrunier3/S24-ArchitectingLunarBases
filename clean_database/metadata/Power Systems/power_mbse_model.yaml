model_identity_and_focus:
  Model Identity and Focus:
  - Model Identity:
    - Model Identifier: LPS-MBSE
    - Model Title: Lunar Power Subsystem – MBSE (SysML)
    - Model Description: >
      SysML/Cameo model capturing lunar power subsystem structure and requirements,
      focused on generation, storage, distribution, and power conditioning/management,
      with allocation to subsystem responsibilities.
    - Model Developer: []
    - Organization / Sponsor: []
    - Model Domain or Discipline:
      - Systems Engineering
      - Electrical Power Systems
    - Model Subsystem or Focus Area:
      - Power Generation
      - Energy Storage
      - Power Distribution
      - Power Conditioning & Management
    - Associated Mission, Program, or Project:
      - Lunar Surface Missions (initial phases)
    - Access Control: Public
  - Model Objectives and Questions:
    - Objective Statements:
      - Define and organize subsystem-level responsibilities for the lunar power chain.
      - Provide traceable requirements to support early design and verification planning.
    - Primary Model Questions:
      - What capability allocations and interfaces are required across the power chain?
      - What early capacity and mass targets guide subsystem design trades?

model_scope_of_content:
  Model Scope of Content:
  - Model Boundaries:
    - Spatial Domain: Lunar surface infrastructure (habitat + loads).
    - Temporal Domain: Early mission phases; continuous power availability.
    - Physical Processes Included:
      - Power generation (solar emphasis), energy storage, distribution, conditioning/management
    - Physical Processes Excluded:
      - Detailed PV/battery physics; CFD/thermal FEA; closed-loop controls (requirements only)
    - System Interfaces Represented:
      - Generation ↔ Storage ↔ Distribution ↔ Conditioning path; load interfaces
    - Model Resolution or Granularity: Requirements/architecture allocation level
  - Inputs and Outputs:
    - Input Variables:
      - Mission load envelopes
      - Surface environment/insolation assumptions
      - Mass and interface constraints
    - Output Variables:
      - Allocated subsystem requirements
      - Sizing/throughput targets (generation, storage, distribution)
    - Input Sources or Datasets: []
    - Output Targets or Consumers:
      - Systems & Power engineering teams
  - External Couplings:
    - Coupled Models or Systems: []
    - Coupling Methods: []
  - Model Fidelity Level:
    - Descriptive Fidelity: Requirements & allocation level
    - Computational Fidelity: Not applicable
    - Representation Fidelity: SysML requirements and structure

