  - Requirements (Flat, paraphrased):
    - System/Subsystem Focus:
      - Provide generation capacity appropriate to early lunar missions.
      - Route power to multiple loads via a distribution subsystem.
      - Include energy storage sized to mission load envelopes.
      - Condition/manage delivered power for downstream users.
      - Provide thermal removal obligations for power components.
    - Power Generation specifics:
      - Utilize photovoltaic generation for initial capability.
      - Target not-less-than ~90 kW order-of-magnitude capacity (early design target).
      - Minimize mass for generation assets.
      - Provide electrical interface into conditioning/management chain.

