title: Lunar Power System – Requirements Model

model_identity_and_focus:
  Model Identity and Focus:
  - Model Identity:
    - Model Identifier: LPS-REQ
    - Model Title: Lunar Power System – Requirements (SysML)
    - Model Description: >
        SysML requirements model for a lunar habitat power system covering generation,
        storage, distribution, conditioning/management, and thermal support for power components.
        Includes top-level system requirements and Subsystem A (Power Generation) requirements.
    - Model Developer: []
    - Organization / Sponsor: []
    - Model Domain or Discipline:
      - Systems Engineering
      - Electrical Power Systems
    - Model Subsystem or Focus Area:
      - Power Generation
      - Energy Storage
      - Power Distribution
      - Power Conditioning & Management
      - Thermal Support for Power Components
    - Associated Mission, Program, or Project:
      - Lunar Surface Missions (initial phases)
    - Access Control: Public
  - Model Objectives and Questions:
    - Objective Statements:
      - Capture, organize, and allocate power-system requirements for early lunar missions.
      - Provide traceable inputs to architecture decisions and verification planning.
    - Primary Model Questions:
      - What capabilities must the power system provide (generate, store, distribute, condition)?
      - What minimum generation capacity and mass constraints guide early design trades?
      - How do subsystem interfaces affect design choices and verification?

model_scope_of_content:
  Model Scope of Content:
  - Model Boundaries:
    - Spatial Domain: Lunar surface infrastructure (habitat and connected systems).
    - Temporal Domain: Early mission phases; continuous/mission-duration availability.
    - Physical Processes Included:
      - Electrical power generation (solar emphasis)
      - Energy storage and retrieval
      - Power distribution and routing
      - Power conditioning and management
      - Thermal support obligations for power components
    - Physical Processes Excluded:
      - Detailed PV device physics or battery electrochemistry models
      - CFD/thermal FEA and closed-loop controllers (captured as requirements only)
    - System Interfaces Represented:
      - Generation ↔ Storage ↔ Distribution ↔ Conditioning chain
      - Electrical interfaces to downstream loads
    - Model Resolution or Granularity: Requirements-level; allocable to subsystems/blocks.
  - Inputs and Outputs:
    - Input Variables:
      - Mission load envelopes
      - Environmental/insolation context and surface constraints
      - Mass and interface constraints
    - Output Variables:
      - Allocated requirements by subsystem
      - Targets for generation capacity and mass
      - Distribution and conditioning capability requirements
    - Input Sources or Datasets: []
    - Output Targets or Consumers:
      - Systems & Power engineering teams
      - Architecture and verification planning
  - External Couplings:
    - Coupled Models or Systems: []
    - Coupling Methods: []
  - Model Fidelity Level:
    - Descriptive Fidelity: Requirements-level with subsystem allocation.
    - Computational Fidelity: Not applicable (no numerical simulation).
    - Representation Fidelity: SysML requirements with hierarchy and allocation.

model_representation:
  Model Representation:
  - Conceptual Model Representation:
    - Conceptual Model Representation Types:
      - Each Conceptual Model:
        - Identifier: SysML-Requirements-Structure
        - Description: >
            MagicDraw SysML packages organizing system-level and power-generation
            requirements with allocation across the power chain (gen/storage/distribution/conditioning).
        - Access Control: Public
        - Defining Activity: Requirements engineering and allocation
        - Representation Method: SysML Requirements (Cameo/MagicDraw)
        - Governing Equations / Logic: []
        - Boundary / Initial Conditions: []
  - Computational Model Representation:
    - Computational Implementation:
      - Software Framework / Language:
        - SysML (MagicDraw / Cameo)
      - Solver or Algorithm Type: []
      - Mesh or Grid Definition: ""
      - Time-stepping Method: ""
      - Numerical Parameters: []
    - Verification Approach:
      - Unit Testing: []
      - Code Review: []
      - Analytical Comparison: []
  - Requirements (Flat, paraphrased):
    - System Requirements (SR1.*):
      - SR1.1: Provide power-generation capability suitable for early lunar missions.
      - SR1.2: Provide means to distribute power to multiple loads.
      - SR1.3: Include capability to store electrical energy.
      - SR1.4: Include subsystems to condition and manage delivered power.
      - SR1.5: Provide a subsystem dedicated to distribution of power to users.
      - SR1.6: Provide thermal control to remove heat from power-system components.
    - Subsystem A – Power Generation (SSR-2.*):
      - SSR-2.1: Utilize photovoltaic generation for early-mission power.
      - SSR-2.2: Achieve a minimum generation capacity on the order of ~90 kW.
      - SSR-2.3: Minimize mass of the power-generation sources.
      - SSR-2.4: Feed generated power into the conditioning and management chain.

