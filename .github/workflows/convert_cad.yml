name: Step 3 — Process CAD (USD → PNG thumbnail + metadata)

on:
  workflow_dispatch:
    inputs:
      module_name:
        description: 'Module name (e.g. ISRUPlant)'
        required: true
      usd_path:
        description: 'Path to USD file in repo (e.g. clean_database/cad_models/ISRUPlant/isruplant.usdz)'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install usd-core trimesh numpy matplotlib
          pip install -e .

      - name: Generate PNG thumbnail + extract metadata
        env:
          MODULE_NAME: ${{ github.event.inputs.module_name }}
          USD_PATH: ${{ github.event.inputs.usd_path }}
        run: |
          mkdir -p outputs/cad_previews
          python - <<'EOF'
          import json, os, time, zipfile
          import numpy as np
          import trimesh
          import trimesh.transformations as tf
          import matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt
          from mpl_toolkits.mplot3d.art3d import Poly3DCollection
          from pxr import Usd, UsdGeom, UsdShade

          module_name = os.environ['MODULE_NAME']
          usd_path    = os.environ['USD_PATH']

          # Handle .usdz (zip)
          actual_usd_path = usd_path
          if usd_path.endswith('.usdz'):
              tmp_dir = '/tmp/usd_extract'
              os.makedirs(tmp_dir, exist_ok=True)
              with zipfile.ZipFile(usd_path, 'r') as z:
                  z.extractall(tmp_dir)
              for root, dirs, files in os.walk(tmp_dir):
                  for f in files:
                      if f.endswith('.usdc') or f.endswith('.usda'):
                          actual_usd_path = os.path.join(root, f)
                          break

          print(f"[PROCESS] Opening {actual_usd_path}")
          stage = Usd.Stage.Open(actual_usd_path)
          mpu     = UsdGeom.GetStageMetersPerUnit(stage)
          up_axis = UsdGeom.GetStageUpAxis(stage)

          # Bounding box
          bbox_cache = UsdGeom.BBoxCache(Usd.TimeCode.Default(), [UsdGeom.Tokens.default_])
          bbox  = bbox_cache.ComputeWorldBound(stage.GetPseudoRoot())
          rng   = bbox.GetRange()
          mn, mx = rng.GetMin(), rng.GetMax()
          size  = mx - mn
          size_m   = [round(abs(size[i]) * mpu, 3) for i in range(3)]
          center_m = [round(((mn[i] + mx[i]) / 2) * mpu, 3) for i in range(3)]
          print(f"[PROCESS] Size (m): {size_m}")

          # Materials
          def to_json_val(v):
              if v is None: return None
              if isinstance(v, (bool, int, str)): return v
              if isinstance(v, float): return round(v, 4)
              try:
                  items = list(v)
                  if all(isinstance(x, (int, float)) for x in items):
                      return [round(float(x), 4) for x in items]
              except TypeError: pass
              try: return round(float(v), 4)
              except (TypeError, ValueError): return str(v)

          materials_found = []
          for prim in stage.Traverse():
              if prim.IsA(UsdShade.Material):
                  mat_data = {"path": str(prim.GetPath()), "properties": {}}
                  for child in prim.GetChildren():
                      shader = UsdShade.Shader(child)
                      if shader:
                          for inp in shader.GetInputs():
                              v = inp.Get()
                              if v is not None:
                                  key = inp.GetFullName().replace("inputs:", "")
                                  mat_data["properties"][key] = to_json_val(v)
                  materials_found.append(mat_data)

          # Extract meshes
          meshes_data = []
          for prim in stage.Traverse():
              if prim.IsA(UsdGeom.Mesh):
                  m = UsdGeom.Mesh(prim)
                  pts    = m.GetPointsAttr().Get()
                  idxs   = m.GetFaceVertexIndicesAttr().Get()
                  counts = m.GetFaceVertexCountsAttr().Get()
                  if not (pts and idxs and counts): continue
                  verts = np.array([[p[0],p[1],p[2]] for p in pts], dtype=np.float32) * mpu
                  faces, idx = [], 0
                  for c in counts:
                      face = [idxs[idx+i] for i in range(c)]
                      for i in range(1, len(face)-1):
                          faces.append([face[0], face[i], face[i+1]])
                      idx += c
                  if faces:
                      meshes_data.append(trimesh.Trimesh(vertices=verts, faces=np.array(faces, dtype=np.int32)))

          print(f"[PROCESS] Extracted {len(meshes_data)} meshes")

          # Generate PNG thumbnail
          png_path = None
          if meshes_data:
              combined = trimesh.util.concatenate(meshes_data)
              # Y-up correction
              if up_axis == 'Y':
                  combined.apply_transform(tf.rotation_matrix(-np.pi/2, [1,0,0]))

              BG = '#111827'
              fig = plt.figure(figsize=(7, 7), facecolor=BG)
              ax  = fig.add_subplot(111, projection='3d', facecolor=BG)

              # Sample faces — enough for good quality
              step = max(1, len(combined.faces) // 5000)
              faces_sub = combined.faces[::step]
              verts_arr = combined.vertices
              polys = [[verts_arr[f[0]], verts_arr[f[1]], verts_arr[f[2]]] for f in faces_sub]

              # Light-facing faces get lighter color (simple diffuse shading)
              normals = combined.face_normals[::step]
              light = np.array([0.6, 0.8, 1.0])
              light /= np.linalg.norm(light)
              shade = np.clip(np.dot(normals, light), 0.15, 1.0)
              colors = np.stack([shade*0.72, shade*0.78, shade*0.88, np.ones_like(shade)*0.92], axis=1)

              coll = Poly3DCollection(polys, linewidth=0, zsort='average')
              coll.set_facecolor(colors)
              coll.set_edgecolor('none')
              ax.add_collection3d(coll)

              b = combined.bounds
              cx = (b[0][0]+b[1][0])/2
              cy = (b[0][1]+b[1][1])/2
              cz = (b[0][2]+b[1][2])/2
              ext = max(b[1]-b[0]) * 0.55
              ax.set_xlim(cx-ext, cx+ext)
              ax.set_ylim(cy-ext, cy+ext)
              ax.set_zlim(cz-ext, cz+ext)
              ax.set_box_aspect([1,1,1])
              ax.view_init(elev=28, azim=45)
              ax.axis('off')
              ax.set_facecolor(BG)
              fig.patch.set_facecolor(BG)

              plt.subplots_adjust(left=0, right=1, top=1, bottom=0)
              png_path = f"outputs/cad_previews/{module_name}.png"
              plt.savefig(png_path, dpi=120, bbox_inches='tight', facecolor=BG, pad_inches=0.05)
              plt.close()
              print(f"[PROCESS] PNG saved: {png_path}")

          # Write metadata
          meta = {
              "written_at":      int(time.time() * 1000),
              "module_name":     module_name,
              "usd_path":        usd_path,
              "png_path":        png_path,
              "up_axis":         up_axis,
              "meters_per_unit": mpu,
              "size_m":          size_m,
              "center_m":        center_m,
              "mesh_count":      len(meshes_data),
              "materials":       materials_found,
          }
          out_path = f"outputs/cad_previews/{module_name}_meta.json"
          with open(out_path, "w") as f:
              json.dump(meta, f, indent=2)
          print(f"[PROCESS] Done — metadata written to {out_path}")
          EOF

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/cad_previews/
          STASHED=$(git stash 2>&1)
          git pull --rebase origin main
          echo "$STASHED" | grep -q "No local changes" || git stash pop
          git add outputs/cad_previews/
          git diff --staged --quiet || git commit -m "chore: CAD preview + metadata for ${{ github.event.inputs.module_name }} [skip ci]"
          git push
