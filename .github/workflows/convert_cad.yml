name: Step 3 — Convert CAD (USD → GLB + extract metadata)

on:
  workflow_dispatch:
    inputs:
      module_name:
        description: 'Module name (e.g. ISRUPlant)'
        required: true
      usd_path:
        description: 'Path to USD file in repo (e.g. clean_database/cad_models/ISRUPlant/isruplant.usdz)'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install usd-core trimesh numpy
          pip install -e .

      - name: Convert USD to GLB and extract metadata
        env:
          MODULE_NAME: ${{ github.event.inputs.module_name }}
          USD_PATH: ${{ github.event.inputs.usd_path }}
        run: |
          mkdir -p outputs/cad_previews
          python - <<'EOF'
          import json, os, time, zipfile
          import numpy as np
          import trimesh
          from pxr import Usd, UsdGeom, UsdShade

          module_name = os.environ['MODULE_NAME']
          usd_path    = os.environ['USD_PATH']

          # Handle .usdz (zip containing .usdc)
          actual_usd_path = usd_path
          if usd_path.endswith('.usdz'):
              tmp_dir = '/tmp/usd_extract'
              os.makedirs(tmp_dir, exist_ok=True)
              with zipfile.ZipFile(usd_path, 'r') as z:
                  z.extractall(tmp_dir)
              for root, dirs, files in os.walk(tmp_dir):
                  for f in files:
                      if f.endswith('.usdc') or f.endswith('.usda'):
                          actual_usd_path = os.path.join(root, f)
                          break

          print(f"[CONVERT] Opening {actual_usd_path}")
          stage = Usd.Stage.Open(actual_usd_path)

          # Bounding box
          bbox_cache = UsdGeom.BBoxCache(Usd.TimeCode.Default(), [UsdGeom.Tokens.default_])
          bbox  = bbox_cache.ComputeWorldBound(stage.GetPseudoRoot())
          rng   = bbox.GetRange()
          mn, mx = rng.GetMin(), rng.GetMax()
          size  = mx - mn
          mpu   = UsdGeom.GetStageMetersPerUnit(stage)
          size_m   = [round(abs(size[i]) * mpu, 3) for i in range(3)]
          center_m = [round(((mn[i] + mx[i]) / 2) * mpu, 3) for i in range(3)]
          print(f"[CONVERT] Size (m): {size_m}")

          # Materials
          def to_json_val(v):
              if v is None: return None
              if isinstance(v, (bool, int, str)): return v
              if isinstance(v, float): return round(v, 4)
              try:
                  items = list(v)
                  if all(isinstance(x, (int, float)) for x in items):
                      return [round(float(x), 4) for x in items]
              except TypeError: pass
              try: return round(float(v), 4)
              except (TypeError, ValueError): return str(v)

          materials_found = []
          for prim in stage.Traverse():
              if prim.IsA(UsdShade.Material):
                  mat_data = {"path": str(prim.GetPath()), "properties": {}}
                  for child in prim.GetChildren():
                      shader = UsdShade.Shader(child)
                      if shader:
                          for inp in shader.GetInputs():
                              v = inp.Get()
                              if v is not None:
                                  key = inp.GetFullName().replace("inputs:", "")
                                  mat_data["properties"][key] = to_json_val(v)
                  materials_found.append(mat_data)

          # Extract meshes and convert to GLB
          meshes_data = []
          for prim in stage.Traverse():
              if prim.IsA(UsdGeom.Mesh):
                  m = UsdGeom.Mesh(prim)
                  pts    = m.GetPointsAttr().Get()
                  idxs   = m.GetFaceVertexIndicesAttr().Get()
                  counts = m.GetFaceVertexCountsAttr().Get()
                  if not (pts and idxs and counts): continue
                  verts = np.array([[p[0], p[1], p[2]] for p in pts], dtype=np.float32)
                  faces, idx = [], 0
                  for c in counts:
                      face = [idxs[idx + i] for i in range(c)]
                      for i in range(1, len(face) - 1):
                          faces.append([face[0], face[i], face[i + 1]])
                      idx += c
                  if faces:
                      meshes_data.append(trimesh.Trimesh(vertices=verts, faces=np.array(faces, dtype=np.int32)))

          print(f"[CONVERT] Extracted {len(meshes_data)} meshes")

          glb_path = None
          if meshes_data:
              glb_path = f"outputs/cad_previews/{module_name}.glb"
              scene = trimesh.Scene(meshes_data)
              glb_bytes = scene.export(file_type='glb')
              with open(glb_path, 'wb') as f:
                  f.write(glb_bytes)
              print(f"[CONVERT] GLB written: {len(glb_bytes)//1024} KB")

          # Write metadata
          meta = {
              "written_at":      int(time.time() * 1000),
              "module_name":     module_name,
              "usd_path":        usd_path,
              "glb_path":        glb_path,
              "up_axis":         UsdGeom.GetStageUpAxis(stage),
              "meters_per_unit": mpu,
              "size_m":          size_m,
              "center_m":        center_m,
              "mesh_count":      len(meshes_data),
              "materials":       materials_found,
          }
          out_path = f"outputs/cad_previews/{module_name}_meta.json"
          with open(out_path, "w") as f:
              json.dump(meta, f, indent=2)
          print(f"[CONVERT] Done — metadata written to {out_path}")
          EOF

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STASHED=$(git stash 2>&1)
          git pull --rebase origin main
          echo "$STASHED" | grep -q "No local changes" || git stash pop
          git add -f outputs/cad_previews/
          git diff --staged --quiet || git commit -m "chore: CAD preview + metadata for ${{ github.event.inputs.module_name }} [skip ci]"
          git push
